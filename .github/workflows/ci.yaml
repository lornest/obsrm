name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Run tests
        run: uv run pytest -v

      - name: Dry-run sync against fixture vault
        run: |
          uv run obsidian-remarkable-sync sync \
            --vault-path tests/fixtures/sample_vault \
            --dry-run
